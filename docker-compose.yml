# OpenBooks compose stack: agent only.
# Dashboard: run locally with npm run dev.
# Database: use deployed DB (set DATABASE_URL in .env).
#
# Run:   docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f agent

name: open-books

services:
  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: open-books-agent
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - services/agent/.env.local
